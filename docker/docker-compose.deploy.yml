# ==========================================
# Selgetabel 生产部署配置（无 nginx，由 BT-Panel 反向代理）
# ==========================================

services:
  # --- 数据库 ---
  postgres:
    image: postgres:18-alpine
    container_name: selgetabel-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-llmexcel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-llmexcel}
    # 不暴露端口到主机，仅容器内部访问
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - /etc/localtime:/etc/localtime:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-llmexcel} -d ${POSTGRES_DB:-llmexcel}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- 对象存储 ---
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    container_name: selgetabel-minio
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    expose:
      - "9000"
      - "9001"
    # 仅暴露 9000 给主机，用于 BT-Panel 代理文件访问
    ports:
      - "9000:9000"
    volumes:
      - minio_data:/data
      - /etc/localtime:/etc/localtime:ro
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- 数据库迁移（一次性） ---
  init-db:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
      args:
        APT_MIRROR_HOST: mirrors.tencent.com
        PIP_INDEX_URL: https://pypi.tuna.tsinghua.edu.cn/simple/
    container_name: selgetabel-init-db
    command: ["alembic", "upgrade", "head"]
    restart: "no"
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-llmexcel}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-llmexcel}
    depends_on:
      postgres:
        condition: service_healthy

  # --- MinIO 初始化（一次性，可选） ---
  init-minio:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
      args:
        APT_MIRROR_HOST: mirrors.tencent.com
        PIP_INDEX_URL: https://pypi.tuna.tsinghua.edu.cn/simple/
    container_name: selgetabel-init-minio
    command: ["python", "-m", "app.scripts.init_minio"]
    restart: "no"
    env_file: .env
    environment:
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_BUCKET=${MINIO_BUCKET}
    volumes:
      - ./minio_data:/minio_data:ro
    depends_on:
      minio:
        condition: service_healthy

  # --- 数据库初始化数据（一次性，可选） ---
  init-db-data:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
      args:
        APT_MIRROR_HOST: mirrors.tencent.com
        PIP_INDEX_URL: https://pypi.tuna.tsinghua.edu.cn/simple/
    container_name: selgetabel-init-db-data
    command: ["python", "-m", "app.scripts.init_db_data"]
    restart: "no"
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-llmexcel}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-llmexcel}
    volumes:
      - ./db_data:/db_data:ro
    depends_on:
      init-db:
        condition: service_completed_successfully

  # --- API 服务 ---
  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
      args:
        APT_MIRROR_HOST: mirrors.tencent.com
        PIP_INDEX_URL: https://pypi.tuna.tsinghua.edu.cn/simple/
    restart: unless-stopped
    env_file: .env
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - OPENAI_MODEL=${OPENAI_MODEL}
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-llmexcel}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-llmexcel}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - BCRYPT_ROUNDS=${BCRYPT_ROUNDS:-12}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_BUCKET=${MINIO_BUCKET}
      - MINIO_PUBLIC_BASE=${MINIO_PUBLIC_BASE}
      - BOB_RELEASE=${BOB_RELEASE:-false}
    expose:
      - "8000"
    # 暴露给主机，供 BT-Panel 反向代理
    ports:
      - "8000:8000"
    depends_on:
      init-db:
        condition: service_completed_successfully
      init-minio:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # --- Web 前端 ---
  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      args:
        NPM_REGISTRY: https://registry.npmmirror.com/
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
    expose:
      - "3000"
    # 暴露给主机，供 BT-Panel 反向代理
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  minio_data:
