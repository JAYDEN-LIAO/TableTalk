name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package code
        run: |
          tar czf /tmp/app.tar.gz \
            --exclude='.git' \
            --exclude='**/node_modules' \
            --exclude='**/.venv' \
            --exclude='**/__pycache__' \
            --exclude='**/*.pyc' \
            --exclude='**/.turbo' \
            --exclude='**/build' \
            --exclude='**/.react-router' \
            --exclude='docker/postgres_data' \
            --exclude='docker/minio_data' \
            .

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p ${{ secrets.SERVER_SSH_PORT }} ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Upload & deploy
        run: |
          scp -P ${{ secrets.SERVER_SSH_PORT }} /tmp/app.tar.gz root@${{ secrets.SERVER_HOST }}:/opt/selgetabel/
          ssh -p ${{ secrets.SERVER_SSH_PORT }} root@${{ secrets.SERVER_HOST }} "
            set -e
            cd /opt/selgetabel
            mkdir -p docker/postgres_data docker/minio_data

            # 保留 .env 和数据库/存储数据
            cp docker/.env /tmp/selgetabel-env-backup 2>/dev/null || true

            # 解压新代码
            rm -rf apps packages docker/docker-compose.deploy.yml docker/nginx docker/scripts
            tar xzf app.tar.gz
            rm -f app.tar.gz

            # 恢复 .env
            cp /tmp/selgetabel-env-backup docker/.env 2>/dev/null || true

            # 构建并重启（使用国内镜像加速）
            cd docker
            docker compose -f docker-compose.deploy.yml build --no-cache api web
            docker compose -f docker-compose.deploy.yml up -d --no-build api web
          "
