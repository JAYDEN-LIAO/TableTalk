name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}-api:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ github.repository }}-api:latest

      - name: Build & push Web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/web/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}-web:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ github.repository }}-web:latest

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p ${{ secrets.SERVER_SSH_PORT }} ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to server
        run: |
          ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.SERVER_SSH_PORT }} root@${{ secrets.SERVER_HOST }} "
            set -e
            cd /opt/selgetabel/docker

            # Login to GHCR
            echo '${{ secrets.GITHUB_TOKEN }}' | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

            # Pull new images
            docker pull ${{ env.REGISTRY }}/${{ github.repository }}-api:latest
            docker pull ${{ env.REGISTRY }}/${{ github.repository }}-web:latest

            # Tag for compose
            docker tag ${{ env.REGISTRY }}/${{ github.repository }}-api:latest selgetabel-api:latest
            docker tag ${{ env.REGISTRY }}/${{ github.repository }}-web:latest selgetabel-web:latest

            # Restart
            docker compose -f docker-compose.deploy.yml up -d --no-build api web
          "
