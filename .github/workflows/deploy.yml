name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package code
        run: |
          tar czf /tmp/app.tar.gz \
            --exclude='.git' \
            --exclude='**/node_modules' \
            --exclude='**/.venv' \
            --exclude='**/__pycache__' \
            --exclude='**/*.pyc' \
            --exclude='**/.turbo' \
            --exclude='**/build' \
            --exclude='**/.react-router' \
            --exclude='docker/postgres_data' \
            --exclude='docker/minio_data' \
            --exclude='fixtures' \
            --exclude='selgetabel-full' \
            --exclude='temp' \
            .

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p ${{ secrets.SERVER_SSH_PORT }} ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Upload code
        run: |
          scp -P ${{ secrets.SERVER_SSH_PORT }} /tmp/app.tar.gz root@${{ secrets.SERVER_HOST }}:/tmp/tabletalk-deploy.tar.gz

      - name: Deploy
        run: |
          ssh -p ${{ secrets.SERVER_SSH_PORT }} root@${{ secrets.SERVER_HOST }} "
            set -e
            cd /opt/selgetabel

            # 保留数据
            cp docker/.env /tmp/talk-env 2>/dev/null || true

            # 解压新代码
            rm -rf apps packages docker/docker-compose.deploy.yml
            tar xzf /tmp/tabletalk-deploy.tar.gz
            rm -f /tmp/tabletalk-deploy.tar.gz

            # 恢复 .env
            cp /tmp/talk-env docker/.env 2>/dev/null || true

            # 构建并重启
            cd docker
            docker compose -f docker-compose.deploy.yml build --no-cache api web
            docker compose -f docker-compose.deploy.yml up -d --no-build api web
          "
